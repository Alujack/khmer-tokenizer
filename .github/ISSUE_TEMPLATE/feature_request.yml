name: Feature request
description: Suggest an improvement or new capability
title: "[feat]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: The use case, not the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: constraints
    attributes:
      label: Project constraints
      options:
        - label: This does not add a third-party runtime dependency to `core/`.
        - label: This does not require committing corpus text (see ATTRIBUTION.md).
