name: Release

# Publishes a tagged release to all three registries:
#   - PyPI     (khmer-tokenizer)      via Trusted Publishing (OIDC), no token
#   - crates.io (khmer-tokenizer-core, khmer-tokenizer-cli) via CARGO_REGISTRY_TOKEN
#   - npm      (kh-tokenizer)         via NPM_TOKEN
#
# One-time setup:
#   PyPI (Manage project -> Publishing -> add a publisher):
#     owner: Alujack   repository: khmer-tokenizer
#     workflow: release.yml   environment: pypi
#   crates.io: add repository secret CARGO_REGISTRY_TOKEN (from crates.io/settings/tokens)
#   npm:       add repository secret NPM_TOKEN (an "Automation" token)
#
# Triggers on version tags (v*). Can also be run manually from the Actions
# tab (workflow_dispatch) — useful for backfilling wheels for an existing
# release, since `skip-existing` makes re-uploads of same-version files a
# no-op rather than an error. The crates.io and npm jobs only run on an
# actual tag push (they have no idempotent "skip-existing", so a manual
# re-run would fail loudly on an already-published version).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wheels:
    name: wheel ${{ matrix.platform.os }}-${{ matrix.platform.target }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-latest, os: linux, target: x86_64 }
          - { runner: ubuntu-latest, os: linux, target: aarch64 }
          - { runner: macos-13, os: macos, target: x86_64 }
          - { runner: macos-14, os: macos, target: aarch64 }
          - { runner: windows-latest, os: windows, target: x64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: py
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          manylinux: auto
      - name: Smoke-test the wheel
        # linux-aarch64 is cross-compiled on an x86_64 runner, so it can't run here
        if: ${{ !(matrix.platform.os == 'linux' && matrix.platform.target == 'aarch64') }}
        shell: bash
        run: |
          pip install khmer-tokenizer --no-index --find-links py/dist
          python -c "from khmer_tokenizer import KhmerTokenizer; assert KhmerTokenizer().segment('សួស្តីអ្នកទាំងអស់គ្នា') == ['សួស្តី', 'អ្នក', 'ទាំងអស់គ្នា']; print('wheel ok')"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.os }}-${{ matrix.platform.target }}
          path: py/dist

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        # maturin vendors the path-dependency (../core) into the sdist, so
        # `pip install` from source works outside this repo checkout.
        uses: PyO3/maturin-action@v1
        with:
          working-directory: py
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: py/dist

  publish:
    name: Publish to PyPI
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  crates:
    name: Publish to crates.io
    # Only on a real tag push — cargo publish is not idempotent.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish core, then cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # core must be on crates.io before cli (a path+version dependency)
          # can resolve the published version. --no-verify keeps the second
          # publish from rebuilding; retry the cli publish so it survives the
          # short indexing delay after core appears.
          cargo publish -p khmer-tokenizer-core
          for i in 1 2 3 4 5; do
            cargo publish -p khmer-tokenizer-cli && break
            echo "cli publish attempt $i failed (core may still be indexing); retrying in 30s"
            sleep 30
          done

  npm:
    name: Publish to npm
    # Only on a real tag push — npm publish is not idempotent.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Build the hybrid npm package
        run: node wasm/prepare-npm-pkg.js
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish wasm/pkg --access public
