name: CI

# The regression guard (docs/ROADMAP.md Phase 6) lives inside `cargo test`
# (eval/tests/regression.rs, against a small hand-authored, committed,
# license-safe fixture) rather than as a separate step here, specifically so
# CI never depends on network access to clone khPOS (gitignored, CC BY-NC-SA
# — see docs/RESEARCH.md §3). `cargo xtask eval`'s numbers against the real
# corpus are recorded by hand in docs/BENCHMARKS.md when a phase lands, not
# run in CI.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Build, test, lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Build workspace
        run: cargo build --workspace --verbose
      - name: Test workspace (includes the Phase 6 regression guard)
        run: cargo test --workspace --verbose
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # The py/ crate is deliberately outside the Cargo workspace (it needs a
  # Python toolchain and pyo3, while the workspace stays zero-dependency),
  # so it gets its own job — same Phase 6 ethos: bindings can't silently rot.
  python-bindings:
    name: Python bindings (py/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Clippy (py crate)
        run: cargo clippy --manifest-path py/Cargo.toml --all-targets -- -D warnings
      - name: Build and install the wheel
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install maturin pytest
          cd py && maturin develop
      - name: Run pytest
        run: |
          . .venv/bin/activate
          cd py && pytest tests/ -v

  # Same detached-crate pattern as py/: the wasm/ crate needs wasm-bindgen,
  # so it lives outside the zero-dependency workspace and gets its own job.
  wasm-bindings:
    name: WASM bindings (wasm/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Clippy (wasm crate)
        run: cargo clippy --manifest-path wasm/Cargo.toml --target wasm32-unknown-unknown --all-targets -- -D warnings
      - name: Test in a real wasm engine (Node)
        run: wasm-pack test --node wasm
      - name: Build the hybrid npm package
        run: node wasm/prepare-npm-pkg.js
